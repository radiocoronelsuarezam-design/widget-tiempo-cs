<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Clima - Coronel Suárez</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 40px;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }
        .clima-widget {
            background: linear-gradient(135deg, #1f4068 0%, #162447 100%);
            color: #ffffff;
            width: 310px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(22, 36, 71, 0.2);
            text-align: center;
        }
        .clima-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 10px;
            margin-bottom: 14px;
        }
        .clima-ciudad { font-size: 1.2rem; font-weight: 700; margin: 0; }
        .clima-fuente { font-size: 0.7rem; color: rgba(255, 255, 255, 0.6); margin: 4px 0 0 0; text-transform: uppercase; }
        
        .clima-principal { 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 8px 0;
        }
        .clima-temp { font-size: 3.2rem; font-weight: 300; margin: 0; line-height: 1; }
        .clima-icono { font-size: 3.2rem; line-height: 1; } 

        .clima-desc-container { margin-bottom: 8px; }
        .clima-desc { font-size: 0.95rem; font-weight: 500; background: rgba(255, 255, 255, 0.15); padding: 5px 12px; border-radius: 20px; display: inline-block; text-transform: capitalize; }
        .clima-detalles { border-top: 1px solid rgba(255, 255, 255, 0.15); padding-top: 12px; margin-top: 12px; }
        .detalle-fila { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 0.85rem; }
        
        .clima-extendido {
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 14px;
            padding-top: 14px;
            display: flex;
            justify-content: space-between;
        }
        .dia-pronostico {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.8rem;
        }
        .dia-nombre {
            font-weight: 600;
            text-transform: capitalize;
            margin-bottom: 4px;
            color: rgba(255, 255, 255, 0.8);
        }
        .dia-icono {
            font-size: 1.4rem;
            margin: 4px 0;
            height: 28px;
            display: flex;
            align-items: center;
        }
        .dia-temps {
            font-size: 0.75rem;
            font-weight: 500;
        }
        .temp-max { color: #ffbc00; margin-right: 4px; }
        .temp-min { color: #a5d6a7; }
    </style>
</head>
<body>

<div class="clima-widget">
    <div class="clima-header">
        <h2 class="clima-ciudad">Coronel Suárez</h2>
        <p class="clima-fuente">Estado del tiempo</p>
    </div>
    
    <div class="clima-principal">
        <div class="clima-temp" id="smn-temp">--°</div>
        <div class="clima-icono" id="smn-icono"><i class="bi bi-cloud-sun" style="color: #e0e0e0;"></i></div>
    </div>
    
    <div class="clima-desc-container">
        <div class="clima-desc" id="smn-desc">Cargando...</div>
    </div>
    
    <div class="clima-detalles">
        <div class="detalle-fila"><span>Humedad</span><span style="font-weight:600;" id="smn-humedad">--%</span></div>
        <div class="detalle-fila"><span>Viento</span><span style="font-weight:600;" id="smn-viento">-- km/h</span></div>
        <div class="detalle-fila"><span>Presión</span><span style="font-weight:600;" id="smn-presion">-- hPa</span></div>
    </div>

    <div class="clima-extendido" id="contenedor-extendido">
        </div>
</div>

<script>
    async function obtenerClima() {
        try {
            const url = 'https://wttr.in/Coronel+Suarez?format=j1&lang=es';
            const respuesta = await fetch(url);
            if (!respuesta.ok) throw new Error("Error en la respuesta de la API");
            
            const datos = await respuesta.json();
            
            if (datos && datos.current_condition && datos.current_condition[0]) {
                const climaActual = datos.current_condition[0];
                
                // 1. Renderizar Clima Actual
                document.getElementById('smn-temp').innerText = `${climaActual.temp_C}°C`;
                document.getElementById('smn-humedad').innerText = `${climaActual.humidity}%`;
                document.getElementById('smn-presion').innerText = `${climaActual.pressure} hPa`;
                document.getElementById('smn-viento').innerText = `${climaActual.windspeedKmph} km/h (${climaActual.winddir16Point || ''})`;
                
                // Extraer el texto descriptivo en español de la API
                const descripcion = climaActual.lang_es ? climaActual.lang_es[0].value : climaActual.weatherDesc[0].value;
                document.getElementById('smn-desc').innerText = descripcion;
                
                // Evaluar si es de noche basándonos en la hora del sistema (noche de 19:00 a 06:00)
                const horaActual = new Date().getHours();
                const esDia = horaActual > 6 && horaActual < 19; 
                
                // Usamos la función basada en texto para el ícono principal (respeta Día/Noche)
                document.getElementById('smn-icono').innerHTML = procesarIconoPorTexto(descripcion, esDia);
                
                // 2. Renderizar Pronóstico Extendido (Próximos 3 días)
                if (datos.weather && datos.weather.length >= 3) {
                    let htmlExtendido = '';
                    
                    for (let i = 0; i < 3; i++) {
                        const diaData = datos.weather[i];
                        const nombreDia = obtenerNombreDia(diaData.date, i);
                        
                        // Obtenemos la descripción del clima del mediodía del pronóstico extendido
                        const descDia = diaData.hourly[4] && diaData.hourly[4].lang_es 
                            ? diaData.hourly[4].lang_es[0].value 
                            : (diaData.hourly[4] ? diaData.hourly[4].weatherDesc[0].value : descripcion);
                        
                        // Para el extendido forzamos esDia = true para que use siempre soles
                        const iconoInfo = procesarIconoPorTexto(descDia, true);
                        
                        htmlExtendido += `
                            <div class="dia-pronostico">
                                <span class="dia-nombre">${nombreDia}</span>
                                <div class="dia-icono">${iconoInfo}</div>
                                <div class="dia-temps">
                                    <span class="temp-max">${diaData.maxtempC}°</span><span class="temp-min">${diaData.mintempC}°</span>
                                </div>
                            </div>
                        `;
                    }
                    document.getElementById('contenedor-extendido').innerHTML = htmlExtendido;
                }
            }
        } catch (error) {
            console.error("Error al conectar con la API:", error);
            document.getElementById('smn-desc').innerText = "Error de conexión";
        }
    }

    // Procesa el ícono buscando palabras clave en el texto descriptivo devuelto por la API
    function procesarIconoPorTexto(descripcion, esDia) {
        if (!descripcion) return '<i class="bi bi-cloud" style="color: #e0e0e0;"></i>';
        const desc = descripcion.toLowerCase();
        
        if (desc.includes("despejado") || desc.includes("soleado") || desc.includes("sol")) {
            return esDia 
                ? '<i class="bi bi-sun" style="color: #ffca28;"></i>' 
                : '<i class="bi bi-moon-stars" style="color: #e0e0e0;"></i>';
        } 
        
        if (desc.includes("parcialmente nublado") || desc.includes("algo nublado") || desc.includes("intervalos")) {
            return esDia 
                ? '<i class="bi bi-cloud-sun" style="color: #e0e0e0;"></i>' 
                : '<i class="bi bi-cloud-moon" style="color: #b0bec5;"></i>';
        } 
        
        if (desc.includes("nublado") || desc.includes("cubierto") || desc.includes("neblina") || desc.includes("niebla")) {
            return desc.includes("niebla") || desc.includes("neblina")
                ? '<i class="bi bi-cloud-haze" style="color: #cfd8dc;"></i>'
                : '<i class="bi bi-cloud" style="color: #b0bec5;"></i>';
        } 
        
        if (desc.includes("lluvia") || desc.includes("llovizna") || desc.includes("chubasco") || desc.includes("precipitación")) {
            return '<i class="bi bi-cloud-rain-heavy" style="color: #4fc3f7;"></i>';
        } 
        
        if (desc.includes("tormenta") || desc.includes("relámpago") || desc.includes("rayos")) {
            return '<i class="bi bi-cloud-lightning-rain" style="color: #b0bec5;"></i>';
        }
        
        // Si no coincide con ninguna de las anteriores, devuelve una nube estándar de respaldo
        return '<i class="bi bi-cloud" style="color: #e0e0e0;"></i>';
    }

    function obtenerNombreDia(fechaStr, indice) {
        if (indice === 0) return 'Hoy';
        if (indice === 1) return 'Mañ';
        const fecha = new Date(fechaStr + 'T00:00:00');
        return fecha.toLocaleDateString('es-AR', { weekday: 'short' }).replace('.', '');
    }

    obtenerClima();
    setInterval(obtenerClima, 15 * 60 * 1000);
</script>

</body>
</html>
